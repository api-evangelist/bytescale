meters:
- name: storage_gigabytes
  description: Total storage used at any point in time, billed per GB beyond the plan bundle (from $0.05/GB).
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - plan
- name: bandwidth_gigabytes
  description: Monthly download (egress) bandwidth, billed per GB beyond the plan bundle (from $0.05/GB).
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - plan
- name: processing_cpu_hours
  description: Media transformation processing time in CPU hours, billed per CPU hour beyond the bundle ($1.875/CPU hour).
  unit: cpu_hours
  aggregation: sum
  dimensions:
  - account
  - plan
- name: upload_requests
  description: Monthly count of files created or overwritten, billed per upload beyond the bundle ($0.0005/upload).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - plan
- name: subscription_fee
  description: Flat monthly subscription fee per plan tier (Basic $7 / Plus $35 / Advanced $195).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track storage, bandwidth, processing, and upload usage against the plan bundle in the Bytescale dashboard.
- name: Allocation
  description: Use folder structure, tags, and per-key usage to map media spend to teams or workloads.
- name: Optimization
  description: Control processing cost via image compression, quality, output format, and dimensions; cache transformed variants at the edge; right-size the plan tier to bundled quotas.
- name: Accountability
  description: Review monthly storage, bandwidth, processing, and upload burn against the plan bundle to avoid overage surprises.
