description: >-
  FinOps view of Bytescale spend. Bytescale bills a monthly subscription per
  plan (Basic / Plus / Advanced) that bundles storage, download bandwidth,
  upload requests, and processing (CPU hours), with pay-as-you-go overage rates
  beyond the bundle: storage and bandwidth per GB, processing per CPU hour, and
  uploads per request. Ingress (uploads) is free except optional accelerated
  uploads. The four primary cost drivers are storage, bandwidth, processing, and
  upload requests.
notes: >-
  Plan quotas and overage rates are subject to change; verify against the
  Bytescale pricing page during reconciliation. Processing is metered as
  CPU hours (e.g. ~6,000 image optimizations or ~40 minutes of video
  conversion per CPU hour).
