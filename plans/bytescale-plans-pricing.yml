specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bytescale
providerId: bytescale
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- File Upload
- Storage
- Image Processing
- CDN
- Media
- Plans
description: >-
  Bytescale uses tiered monthly subscription plans (Basic, Plus, Advanced) that
  each bundle a quota of storage, download bandwidth, upload requests, and
  processing capacity (expressed as a CPU-hour multiplier), plus a free trial.
  Usage beyond the bundled quota is billed pay-as-you-go: storage and bandwidth
  per GB, processing per CPU hour, and uploads per request. Ingress (uploads) is
  free except for optional accelerated uploads. Enterprise pricing is available
  on request.
notes: >-
  Plan quotas and rates as published on the Bytescale pricing page; verify the
  page for the current free trial terms, exact tier quotas, and overage rates.
sources:
- https://www.bytescale.com/pricing
- https://support.bytescale.com/article/10-what-happens-if-i-exceed-the-limits
